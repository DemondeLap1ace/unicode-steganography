name: Unicode Invisible Character Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unicode-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scan for invisible Unicode characters
        run: |
          echo "Scanning repository for invisible Unicode characters..."
          python pua-npm/detect.py . --json > scan-results.json
          python pua-npm/detect.py . --hex-context 8
        continue-on-error: true

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unicode-scan-results
          path: scan-results.json
